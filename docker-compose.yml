services:
  web:
    build: ./app
    container_name: voting_web
    expose:
      - "8000"
    environment:
      DATABASE_URL: mysql+pymysql://votinguser:votingpass@db:3306/votingdb
      LOG_LEVEL: info              
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - waf_logs:/var/log/nginx:ro
    networks:
      - app_net
      - db_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: voting_waf
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/waf.conf:/etc/nginx/conf.d/waf.conf:ro
      - waf_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - app_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: voting_db
    ports:
      - "33306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: votingdb
      MYSQL_USER: votinguser
      MYSQL_PASSWORD: votingpass
    volumes:
      - db_data:/var/lib/mysql
      # keep slow query logs on a host path
      # - ./mysql-logs:/var/log/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpass || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - db_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

volumes:
  db_data:
  waf_logs:

networks:
  app_net:
  db_net: