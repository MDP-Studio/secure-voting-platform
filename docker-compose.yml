version: "3.9"

services:
  web:
    build: ./app
    container_name: voting_web
    expose:
      - "8000"
    depends_on:
      - db

  waf:
    image: nginx:latest
    container_name: voting_waf
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

  db:
    image: mysql:8
    container_name: voting_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: votingdb
      MYSQL_USER: votinguser
      MYSQL_PASSWORD: votingpass
    ports:
      - "33306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
