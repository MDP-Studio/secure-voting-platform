name: Run Critical Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up environment variables (SQLite for testing)
        run: |
          echo "DEPLOYMENT_ENV=testing" >> $GITHUB_ENV
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-do-not-use-in-production" >> $GITHUB_ENV
          echo "GEO_FILTER_ENABLED=False" >> $GITHUB_ENV
          echo "ENABLE_MFA=False" >> $GITHUB_ENV

      - name: Run Smoke Tests
        run: |
          python -m pytest tests/test_smoke.py -v --tb=short

      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_password_validation.py tests/test_password_policy.py -v --tb=short

      - name: Run Integration Tests (Docker)
        run: |
          # Build and start Docker containers
          echo "🐳 Starting Docker containers..."
          docker-compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to be ready..."
          for i in {1..60}; do
            # Check if health endpoint responds
            if curl -f http://localhost/healthz > /dev/null 2>&1; then
              echo "✅ Services are ready!"
              break
            fi
            echo "⏳ Attempt $i/60: Waiting for services..."
            sleep 1
          done
          
          # Run integration tests against Docker
          python -m pytest tests/integration/test_integration.py::TestHealthChecks -v --tb=short --base-url=http://localhost || TEST_RESULT=$?
          
          # Show Docker logs for debugging if tests failed
          if [ ${TEST_RESULT:-0} -ne 0 ]; then
            echo "❌ Tests failed. Docker logs:"
            docker-compose logs --tail=50
          fi
          
          # Cleanup
          docker-compose down -v
          
          exit ${TEST_RESULT:-0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.xml

      - name: Test Report
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed for branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
