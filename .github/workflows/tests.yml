name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOYMENT_ENV: testing
  FLASK_ENV: testing
  SECRET_KEY: test-secret-key-ci
  GEO_FILTER_ENABLED: "False"
  ENABLE_MFA: "False"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run all tests
        run: python -m pytest tests/ -v --tb=short

      - name: Summary
        if: always()
        run: echo "## Tests completed for ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
